<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TBTI - 网球人格测试</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --green: #1a7a3a;
  --green-light: #2d9b50;
  --green-dark: #0f5a28;
  --blue: #1b4f72;
  --yellow: #c8e600;
  --yellow-bright: #e6ff00;
  --bg: #0a1a0f;
  --card-bg: #112118;
  --text: #e8f0e8;
  --text-dim: #8fa898;
  --accent: #4ade80;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== 开始页 ===== */
.page { display: none; min-height: 100vh; }
.page.active { display: flex; flex-direction: column; align-items: center; }

#startPage {
  justify-content: center;
  text-align: center;
  padding: 2rem;
  background: radial-gradient(ellipse at 50% 30%, rgba(26,122,58,0.3) 0%, var(--bg) 70%);
}

.logo-ball {
  width: 120px; height: 120px;
  background: radial-gradient(circle at 35% 35%, var(--yellow-bright), #9ab800);
  border-radius: 50%;
  margin: 0 auto 1.5rem;
  position: relative;
  box-shadow: 0 0 60px rgba(200,230,0,0.3);
  animation: float 3s ease-in-out infinite;
}
.logo-ball::after {
  content: '';
  position: absolute;
  top: 15%; left: 10%; right: 10%; bottom: 15%;
  border: 3px solid rgba(255,255,255,0.4);
  border-radius: 50%;
  clip-path: path('M 0 45 Q 25 20 50 45 Q 75 70 100 45');
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

h1 {
  font-size: 3rem;
  font-weight: 900;
  letter-spacing: 0.15em;
  margin-bottom: 0.3rem;
  background: linear-gradient(135deg, var(--yellow-bright), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.subtitle {
  font-size: 1.1rem;
  color: var(--text-dim);
  margin-bottom: 2.5rem;
}

.start-btn {
  display: inline-block;
  padding: 1rem 3rem;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--bg);
  background: linear-gradient(135deg, var(--yellow), var(--accent));
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 0.05em;
}
.start-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px rgba(74,222,128,0.4);
}

.start-info {
  margin-top: 1.5rem;
  font-size: 0.85rem;
  color: var(--text-dim);
}

/* ===== 测试页 ===== */
#quizPage {
  padding: 1rem;
  max-width: 600px;
  width: 100%;
  margin: 0 auto;
}

.progress-bar-container {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  margin: 1rem 0 0.5rem;
  overflow: hidden;
  position: sticky;
  top: 0;
  z-index: 10;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--accent));
  border-radius: 3px;
  transition: width 0.4s ease;
}
.progress-text {
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-bottom: 1.5rem;
}

.question-card {
  background: var(--card-bg);
  border: 1px solid rgba(74,222,128,0.15);
  border-radius: 16px;
  padding: 2rem 1.5rem;
  margin-bottom: 1rem;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.q-number {
  font-size: 0.8rem;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 0.8rem;
  letter-spacing: 0.1em;
}
.q-text {
  font-size: 1.15rem;
  font-weight: 600;
  line-height: 1.6;
  margin-bottom: 1.5rem;
}

.option-btn {
  display: block;
  width: 100%;
  padding: 1rem 1.2rem;
  margin-bottom: 0.8rem;
  font-size: 1rem;
  line-height: 1.5;
  color: var(--text);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(74,222,128,0.2);
  border-radius: 12px;
  cursor: pointer;
  text-align: left;
  transition: all 0.25s;
}
.option-btn:hover {
  background: rgba(74,222,128,0.1);
  border-color: var(--accent);
  transform: translateX(4px);
}
.option-btn.selected {
  background: rgba(74,222,128,0.15);
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
}

/* ===== 结果页 ===== */
#resultPage {
  padding: 1.5rem;
  max-width: 600px;
  width: 100%;
  margin: 0 auto;
  text-align: center;
}

.result-header {
  margin: 2rem 0 1rem;
}
.result-prefix {
  font-size: 1rem;
  color: var(--accent);
  letter-spacing: 0.15em;
  font-weight: 600;
}
.result-name {
  font-size: 2.2rem;
  font-weight: 900;
  margin: 0.3rem 0;
  background: linear-gradient(135deg, var(--yellow-bright), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.result-code {
  font-size: 0.9rem;
  color: var(--text-dim);
  letter-spacing: 0.2em;
  margin-bottom: 0.5rem;
}
.result-player {
  font-size: 0.95rem;
  color: var(--accent);
  margin-bottom: 1.5rem;
}

.result-emoji {
  font-size: 5rem;
  margin: 1rem 0;
  filter: drop-shadow(0 0 20px rgba(74,222,128,0.3));
}

.result-card {
  background: var(--card-bg);
  border: 1px solid rgba(74,222,128,0.15);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1rem;
  text-align: left;
}
.result-card h3 {
  font-size: 1rem;
  color: var(--accent);
  margin-bottom: 0.8rem;
  letter-spacing: 0.05em;
}
.result-card p, .result-card li {
  font-size: 0.95rem;
  line-height: 1.7;
  color: var(--text);
}
.result-card ul {
  list-style: none;
  padding: 0;
}
.result-card ul li::before {
  content: '• ';
  color: var(--accent);
}

.dimension-bars {
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}
.dim-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.85rem;
}
.dim-label {
  width: 55px;
  text-align: right;
  color: var(--text-dim);
  flex-shrink: 0;
}
.dim-bar-bg {
  flex: 1;
  height: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}
.dim-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.6s ease;
}
.dim-bar-fill.left {
  background: linear-gradient(90deg, var(--accent), transparent);
  float: right;
}
.dim-bar-fill.right {
  background: linear-gradient(90deg, transparent, var(--yellow));
}
.dim-label-right {
  width: 55px;
  text-align: left;
  color: var(--text-dim);
  flex-shrink: 0;
}
.dim-active {
  color: var(--accent) !important;
  font-weight: 700;
}

.restart-btn {
  display: inline-block;
  padding: 0.8rem 2.5rem;
  font-size: 1rem;
  font-weight: 600;
  color: var(--accent);
  background: transparent;
  border: 2px solid var(--accent);
  border-radius: 50px;
  cursor: pointer;
  margin-top: 1.5rem;
  transition: all 0.3s;
}
.restart-btn:hover {
  background: rgba(74,222,128,0.1);
}

.share-hint {
  margin-top: 1rem;
  font-size: 0.8rem;
  color: var(--text-dim);
}

.back-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 0.9rem;
  cursor: pointer;
  padding: 0.3rem 0;
  margin-bottom: 0.5rem;
  transition: color 0.2s;
}
.back-btn:hover {
  color: var(--accent);
}

/* ===== 响应式 ===== */
@media (max-width: 480px) {
  h1 { font-size: 2.2rem; }
  .q-text { font-size: 1.05rem; }
  .result-name { font-size: 1.8rem; }
  .question-card { padding: 1.5rem 1.2rem; }
}
</style>
</head>
<body>

<!-- ===== 开始页 ===== -->
<div id="startPage" class="page active">
  <div class="logo-ball"></div>
  <h1>TBTI</h1>
  <div class="subtitle">Tennis Ball Type Indicator · 网球人格测试</div>
  <button class="start-btn" onclick="startQuiz()">开始测试</button>
  <div class="start-info">25道题 · 约3分钟 · 发现你的网球人格</div>
</div>

<!-- ===== 测试页 ===== -->
<div id="quizPage" class="page">
  <div class="progress-bar-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="progress-text" id="progressText"></div>
  <div id="questionContainer"></div>
</div>

<!-- ===== 结果页 ===== -->
<div id="resultPage" class="page">

</div>

<script>
// ===== 题目数据 =====
const questions = [

  { text: "对手回了一个不太深的球到你正手位，第一反应？", dim: 0,

    a: "还是认真打，练习战术执行", b: "放松下来，试试花式击球" },
  { text: "约朋友打球更喜欢？", dim: 4,

    strengths: ['跑动能力MAX，体力无限', '快乐到让对手都不好意思赢你', '是球场氛围的灵魂人物'],
    weaknesses: ['太快乐了经常忘了比分', '追球的姿势不太优雅但很可爱'],
    advice: '保持快乐就好，这是网球给你最好的礼物。偶尔记一下比分会更好。' },
  'DCW': { name: '人形AI', player: '德约科维奇', emoji: '🤖',
    desc: '你打球跟ChatGPT一样——稳定输出、永不崩溃、没有情绪。你不犯错，你只等对手犯错。你的每一拍都是经过计算的最优解，你的每一步都恰好在正确的位置。对手最崩溃的是：打了两小时，你像刚上场一样。',
    strengths: ['失误率低到离谱', '心态比石头还稳', '越打到后面越强，堪称持久战之王'],

  'DCE': { name: '球场NPC', player: '', emoji: '🧘',
    desc: '你是球场上最佛系的存在——别人在打比赛，你在打太极。不急、不躁、不在乎比分，每一拍都心如止水。别人3:5落后会着急，你落后了只会说"哦，是吗"。你打球的样子让人分不清你是来运动的还是来冥想的。',
    strengths: ['心态永远不崩，因为从来没在乎过', '极致松弛感，手感反而很好', '是球场上最治愈的存在'],
    weaknesses: ['佛到让搭档想摇你肩膀：醒醒！', '对手都不忍心赢你，但还是赢了'],

// ===== 状态 =====
let currentQ = 0;
let scores = [0, 0, 0, 0, 0]; // 每维度：a选项得分（越高越倾向第一极）
let shuffledQuestions = [];
let answerMap = []; // 记录每题是否已答

function shuffleArray(arr) {
  const result = arr.map((item, idx) => ({ ...item, origIdx: idx }));
  for (let i = result.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [result[i], result[j]] = [result[j], result[i]];
  }
  return result;
}

function startQuiz() {
  currentQ = 0;
  scores = [0, 0, 0, 0, 0];
  // 打乱题目顺序
  shuffledQuestions = shuffleArray(questions);
  answerMap = new Array(25).fill(null);

  document.getElementById('startPage').classList.remove('active');
  document.getElementById('quizPage').classList.add('active');
  showQuestion();
}

function showQuestion() {
  const q = shuffledQuestions[currentQ];
  const container = document.getElementById('questionContainer');
  const progress = ((currentQ) / 25) * 100;

  document.getElementById('progressBar').style.width = progress + '%';
  document.getElementById('progressText').textContent = `${currentQ + 1} / 25`;

  const backBtn = currentQ > 0
    ? `<button class="back-btn" onclick="goBack()">< 上一题</button>`
    : '';

  container.innerHTML = `
    ${backBtn}
    <div class="question-card">
      <div class="q-number">Q${currentQ + 1}</div>
      <div class="q-text">${q.text}</div>
      <button class="option-btn" onclick="selectOption('a')">A. ${q.a}</button>
      <button class="option-btn" onclick="selectOption('b')">B. ${q.b}</button>
    </div>
  `;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  if (currentQ <= 0) return;
  currentQ--;
  // 撤销上一题的得分
  const prevChoice = answerMap[currentQ];
  if (prevChoice === 'a') {
    scores[shuffledQuestions[currentQ].dim]--;
  }
  answerMap[currentQ] = null;
  showQuestion();
}

function selectOption(choice) {
  const q = shuffledQuestions[currentQ];
  const dim = q.dim;

  // 记录选择
  answerMap[currentQ] = choice;

  if (choice === 'a') {
    scores[dim]++;
  }
  // b选项不加分，最终用 5-score 算另一极

  // 高亮选中
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.classList.remove('selected'));
  btns[choice === 'a' ? 0 : 1].classList.add('selected');

  // 延迟进入下一题
  setTimeout(() => {
    currentQ++;
    if (currentQ >= 25) {
      showResult();
    } else {
      showQuestion();
    }
  }, 300);
}

function getResult() {
  const letters = [];
  for (let i = 0; i < 5; i++) {
    // scores[i] = 该维度选a的次数（0-5）
    // >=3 → 第一极字母，<3 → 第二极字母
    letters.push(scores[i] >= 3 ? dimLetters[i][0] : dimLetters[i][1]);
  }
  // letters = [A/D, P/F, S/R, H/C, W/E]
  const prefixKey = letters[1] + letters[2]; // P/F + S/R
  const coreKey = letters[0] + letters[3] + letters[4]; // A/D + H/C + W/E

  return {
    letters,
    prefixKey,
    coreKey,
    prefix: prefixes[prefixKey],
    core: cores[coreKey],
    code: prefixKey + '-' + coreKey,
    fullName: prefixes[prefixKey].name + '·' + cores[coreKey].name,
  };
}

function showResult() {
  document.getElementById('quizPage').classList.remove('active');
  document.getElementById('resultPage').classList.add('active');

  const result = getResult();
  const { prefix, core, code, fullName, letters } = result;
  const mainEmoji = core.emoji;

  let playerHtml = '';
  if (core.player) {
    playerHtml = `<div class="result-player">精神图腾：${core.player}</div>`;
  }

  // 维度条
  let dimBarsHtml = '';
  for (let i = 0; i < 5; i++) {
    const aScore = scores[i];
    const bScore = 5 - scores[i];
    const aPercent = (aScore / 5) * 100;
    const bPercent = (bScore / 5) * 100;
    const aActive = aScore >= 3 ? 'dim-active' : '';
    const bActive = bScore >= 3 ? 'dim-active' : '';

    dimBarsHtml += `
      <div class="dim-row">
        <span class="dim-label ${aActive}">${dimLabels[i][0]}</span>
        <div class="dim-bar-bg">
          <div style="display:flex;height:100%;">
            <div style="flex:${aScore};background:linear-gradient(90deg, var(--accent), rgba(74,222,128,0.2));border-radius:4px 0 0 4px;"></div>
            <div style="flex:${bScore};background:linear-gradient(90deg, rgba(200,230,0,0.2), var(--yellow));border-radius:0 4px 4px 0;"></div>
          </div>
        </div>
        <span class="dim-label-right ${bActive}">${dimLabels[i][1]}</span>
      </div>
    `;
  }

  document.getElementById('resultContent').innerHTML = `
    <div class="result-header">
      <div class="result-prefix">你的网球人格是</div>
      <div class="result-emoji">${prefix.emoji}${mainEmoji}</div>
      <div class="result-name">${fullName}</div>
      <div class="result-code">${code}</div>
      ${playerHtml}
    </div>

    <div class="result-card">
      <h3>你是谁</h3>
      <p>${prefix.desc}</p>
      <p style="margin-top:0.8rem;">${core.desc}</p>
    </div>

    <div class="result-card">
      <h3>维度分析</h3>
      <div class="dimension-bars">
        ${dimBarsHtml}
      </div>
    </div>

    <div class="result-card">
      <h3>你的优势</h3>
      <ul>${core.strengths.map(s => `<li>${s}</li>`).join('')}</ul>
    </div>

    <div class="result-card">
      <h3>你的弱点</h3>
      <ul>${core.weaknesses.map(s => `<li>${s}</li>`).join('')}</ul>
    </div>

    <div class="result-card">
      <h3>给你的建议</h3>
      <p>${core.advice}</p>
    </div>

    <button class="restart-btn" onclick="restart()">重新测试</button>
    <div class="share-hint">截图分享给球友，看看他们是什么类型 🎾</div>
  `;

  document.getElementById('progressBar').style.width = '100%';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  document.getElementById('resultPage').classList.remove('active');
  document.getElementById('startPage').classList.add('active');
}
</script>
